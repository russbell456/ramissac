version: '3.8'

services:
  # 1. TU APP (FastAPI)
  backend:
    build: .
    container_name: ramissac_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - devops_network

  # 2. TU BASE DE DATOS (App)
  db:
    image: postgres:15
    container_name: ramissac_db
    restart: always
    environment:
      POSTGRES_DB: ramissac_db
      POSTGRES_USER: ramissac_user
      POSTGRES_PASSWORD: ramissac_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops_network

  # 3. JENKINS (Personalizado para reconocer Docker)
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins_server
    privileged: true
    user: root
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devops_network
    restart: unless-stopped

  # 4. NGINX (Proxy)
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./infra-devops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - jenkins
    networks:
      - devops_network

  # 5. BASE DE DATOS DE SONARQUBE
  sonardb:
    image: postgres:15-alpine
    container_name: sonarqube_db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar_secure_pass
      - POSTGRES_DB=sonar
    networks:
      - devops_network
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 6. SONARQUBE
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube_server
    depends_on:
      - sonardb
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonardb:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_secure_pass
    networks:
      - devops_network
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

networks:
  devops_network:
    driver: bridge

volumes:
  postgres_data:
  jenkins_home:
    external: true
    name: infra-devops_jenkins_home
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions: