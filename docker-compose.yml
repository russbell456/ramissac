services:
  docs:
    image: python:3.9-slim
    container_name: ramissac_docs
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install mkdocs-material && mkdocs serve --dev-addr=0.0.0.0:8001"
    ports:
      - "8001:8001"
    networks:
      - devops_network

  # 1. BACKEND FASTAPI
  backend:
    build: .
    container_name: ramissac_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: "postgresql://ramissac_user:ramissac_password@db:5432/ramissac_db"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - devops_network

  # 2. DATABASE (POSTGRES APP)
  db:
    image: postgres:15
    container_name: ramissac_db
    restart: always
    environment:
      POSTGRES_DB: ramissac_db
      POSTGRES_USER: ramissac_user
      POSTGRES_PASSWORD: ramissac_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops_network

  # 3. JENKINS
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins_server
    privileged: true
    user: root
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devops_network
    restart: unless-stopped

  # 4. NGINX (PROXY)
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./infra-devops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Volumen añadido para reflejar los reportes de Allure generados localmente
      - ./allure-report:/usr/share/nginx/html/allure-report:ro
    depends_on:
      - jenkins
    networks:
      - devops_network

  # 5. SONAR DATABASE
  sonardb:
    image: postgres:15-alpine
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_secure_pass
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - devops_network
    restart: unless-stopped

  # 6. SONARQUBE
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube_server
    depends_on:
      - sonardb
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_secure_pass
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - devops_network
    restart: unless-stopped

networks:
  devops_network:
    driver: bridge

volumes:
  postgres_data:
  jenkins_home:
    external: true
    name: infra-devops_jenkins_home
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
