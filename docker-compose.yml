services:
  backend:
    build: .
    container_name: ramissac_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15
    container_name: ramissac_db
    restart: always
    environment:
      POSTGRES_DB: ramissac_db
      POSTGRES_USER: ramissac_user
      POSTGRES_PASSWORD: ramissac_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
